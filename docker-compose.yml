services:
  postgres:
    image: postgres:16
    container_name: block70-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-block70}
      POSTGRES_USER: ${POSTGRES_USER:-block70}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-block70password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: block70-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ./apps/api
    container_name: block70-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-block70}:${POSTGRES_PASSWORD:-block70password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-block70}
    depends_on:
      - postgres
      - redis
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        API_SERVER_URL: ${API_SERVER_URL:-http://api:8000}
    container_name: block70-web
    env_file:
      - .env
    environment:
      # Use API_SERVER_URL from .env (e.g. http://108.175.11.229:8000) so the container can reach the API.
      # If unset, falls back to http://api:8000 (Docker service name).
      API_SERVER_URL: ${API_SERVER_URL:-http://api:8000}
    extra_hosts:
      # Allows host.docker.internal:8000 from inside container (Linux)
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:

