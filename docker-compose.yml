services:
  postgres:
    image: postgres:16
    container_name: block70-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-block70}
      POSTGRES_USER: ${POSTGRES_USER:-block70}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-block70password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: block70-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ./apps/api
    container_name: block70-api
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-block70}:${POSTGRES_PASSWORD:-block70password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-block70}
    depends_on:
      - postgres
      - redis
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        API_SERVER_URL: ${API_SERVER_URL:-http://api:8000}
    container_name: block70-web
    env_file:
      - .env
    environment:
      API_SERVER_URL: ${API_SERVER_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      # Ingest webhook + /crypto-hour DB; must match repo root .env (visible via docker exec block70-web env)
      WEBSITE_PUBLISH_SECRET: ${WEBSITE_PUBLISH_SECRET:-}
      CRYPTO_HOUR_DATABASE_URL: ${CRYPTO_HOUR_DATABASE_URL:-}
    extra_hosts:
      # Allows host.docker.internal:8000 from inside container (Linux)
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    networks:
      - default
      - block70_coh_edge
    # Host port → container :3000. If bind fails, free host :3000 or set WEB_PORT=3001 in .env
    ports:
      - "${WEB_PORT:-3000}:3000"

networks:
  # Created by apps/crypto-on-the-hour/docker-compose (coh postgres). Same DB @ coh-postgres:5432.
  block70_coh_edge:
    external: true

volumes:
  postgres_data:

