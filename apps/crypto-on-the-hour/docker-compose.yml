# Local infra for Crypto On the Hour (optional)
# If 6379 or 5432 is already in use on the host, change the LEFT side only, e.g. "6380:6379" or "5433:5432".
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_on_the_hour
    ports:
      - "5432:5432"
    volumes:
      - coh_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  coh_pg: {}
