# Local infra for Crypto On the Hour (optional)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_on_the_hour
    ports:
      - "5432:5432"
    volumes:
      - coh_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  coh_pg: {}
