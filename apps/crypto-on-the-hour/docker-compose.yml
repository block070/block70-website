# Local infra for Crypto On the Hour (optional)
# Host ports avoid conflicts when 5432/6379 are already in use: Postgres 5433→5432, Redis 6380→6379.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_on_the_hour
    ports:
      - "5433:5432"
    volumes:
      - coh_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  coh_pg: {}
